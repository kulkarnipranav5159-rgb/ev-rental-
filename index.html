<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV-Go | Smart Rental</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: linear-gradient(135deg, #eefdf5 0%, #daf5e6 100%); padding: 80px 0; }
        .card { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .btn-primary { background-color: #28a745; border: none; }
        .btn-primary:hover { background-color: #218838; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">⚡ EV-Go Rentals</a>
    </div>
</nav>

<section class="hero-section text-center">
    <h1 class="display-4 fw-bold text-dark">Rent the Future</h1>
    <p class="lead text-secondary">Premium Electric Cars & Two-Wheelers in Pune</p>
</section>

<div class="container my-5">
    <div class="row g-4" id="vehicle-list">
        </div>
</div>

<div class="modal fade" id="bookingModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Confirm Booking</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="bookingForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" placeholder="Enter your name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Duration (Days)</label>
            <input type="number" class="form-control" value="1" min="1">
          </div>
          <p class="text-muted small">Pickup Point: Pune Camp Center</p>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="confirmBooking()">Confirm Rental</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const vehicles = [
        { name: "Tesla Model 3", type: "Car", price: "₹5000/day", img: "https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=400" },
        { name: "Ather 450X", type: "Scooter", price: "₹800/day", img: "https://images.unsplash.com/photo-1595111162232-90141362e5b8?w=400" },
        { name: "Tata Nexon EV", type: "Car", price: "₹3500/day", img: "https://images.unsplash.com/photo-1619767886558-efdc259c6e09?w=400" }
    ];

    const list = document.getElementById('vehicle-list');
    vehicles.forEach((v, index) => {
        list.innerHTML += `
            <div class="col-md-4">
                <div class="card h-100">
                    <img src="${v.img}" class="card-img-top" alt="vehicle">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">${v.name}</h5>
                        <span class="badge rounded-pill bg-light text-success mb-2 border border-success">${v.type}</span>
                        <h6 class="text-primary mb-3">${v.price}</h6>
                        <button class="btn btn-primary w-100" onclick="openBooking('${v.name}')">Book Now</button>
                    </div>
                </div>
            </div>`;
    });

    function openBooking(vehicleName) {
        document.getElementById('modalTitle').innerText = "Rent " + vehicleName;
        var myModal = new bootstrap.Modal(document.getElementById('bookingModal'));
        myModal.show();
    }

    function confirmBooking() {
        alert("Booking Successful! Our team will contact you for pickup.");
        location.reload(); 
    }
</script>
</body>
</html>
